<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizador de Plantillas — Correos Transaccionales</title>
    <link rel="stylesheet" href="../../assets/css/shared.css" />
    <script src="../../assets/js/vendor/handlebars-4.7.8.min.js"></script>
    <style>
      .ct-vis-page {
        max-width: 1500px;
      }

      .ct-vis-page .ct-preview-pane {
        flex: 1 1 820px;
        min-width: 0;
      }

      .ct-vis-page .ct-preview-controls {
        flex-basis: 320px;
      }

      .ct-vis-page .ct-preview-frame-wrap {
        align-items: flex-start;
        overflow: hidden;
      }

      .ct-vis-field-note {
        display: block;
        min-height: 18px;
        margin-top: 5px;
        color: #64748b;
        font-size: 12px;
        line-height: 17px;
      }
      .ct-vis-field-note.ct-coverage-empty { color: #ef4444; font-weight: 600; }
      .ct-vis-field-note.ct-coverage-low   { color: #d97706; font-weight: 500; }
      .ct-vis-field-note.ct-coverage-ok    { color: #16a34a; }

      .ct-vis-scenario-note {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--ct-card-border);
        color: #526174;
        font-size: 12px;
        line-height: 18px;
      }

      .ct-vis-facets {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .ct-vis-facet {
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-size: 11px;
        color: var(--ct-text-muted);
      }
      .ct-vis-facet select { width: 100%; }
      .ct-vis-scenario-facets {
        display: block;
        margin-top: 8px;
      }
      .ct-vis-scenario-facets .ct-badge { margin: 0 4px 4px 0; }
    </style>
  </head>
  <body>
    <header class="ct-topbar" data-ct-topbar></header>

    <main class="ct-page ct-vis-page">
      <h1>Visualizador de Plantillas</h1>
      <p class="ct-subtitle">
        Previsualización de una plantilla HTML con un escenario de datos compatible.
      </p>

      <div class="ct-preview-tool">
        <aside class="ct-preview-controls">
          <div>
            <label for="ct-vis-platform">Plataforma</label>
            <select id="ct-vis-platform" aria-label="Filtrar por plataforma">
              <option value="">Todas</option>
            </select>
          </div>
          <div>
            <label for="ct-vis-channel">Canal</label>
            <select id="ct-vis-channel" aria-label="Filtrar por canal">
              <option value="">Todos</option>
            </select>
          </div>
          <div>
            <label for="ct-vis-store">Tienda</label>
            <select id="ct-vis-store" aria-label="Filtrar por tienda">
              <option value="">Todas</option>
            </select>
          </div>
          <div>
            <label for="ct-vis-logistica">Logística</label>
            <select id="ct-vis-logistica" aria-label="Filtrar por logística">
              <option value="">Todas</option>
            </select>
          </div>
          <div>
            <label for="ct-vis-template">Plantilla HTML</label>
            <select id="ct-vis-template" aria-label="Elegir plantilla"></select>
          </div>
          <div>
            <label>Facetas del escenario</label>
            <div class="ct-vis-facets" id="ct-vis-facets" role="group" aria-label="Filtrar escenarios por facetas"></div>
          </div>
          <div>
            <label for="ct-vis-example">Escenario de datos compatible</label>
            <select id="ct-vis-example" aria-label="Elegir escenario de datos"></select>
            <small class="ct-vis-field-note" id="ct-vis-example-help"></small>
          </div>
          <div>
            <label>Formato de vista</label>
            <div class="ct-device-switch" id="ct-vis-device-switch" aria-label="Elegir formato de vista">
              <button type="button" data-device="desktop">Desktop</button>
              <button type="button" data-device="tablet">Tablet</button>
              <button type="button" data-device="mobile">Mobile</button>
            </div>
          </div>
          <div class="ct-card ct-preview-info">
            <div class="ct-badges" id="ct-vis-badges"></div>
            <h3 id="ct-vis-nombre"></h3>
            <p id="ct-vis-descripcion"></p>
            <p class="ct-meta"><strong>Plantilla HTML:</strong> <code id="ct-vis-archivo"></code></p>
            <p class="ct-meta"><strong>Escenario:</strong> <span id="ct-vis-scenario-label"></span></p>
            <p class="ct-meta"><strong>JSON del escenario:</strong> <code id="ct-vis-ejemplo"></code></p>
            <p class="ct-vis-scenario-note" id="ct-vis-scenario-note"></p>
            <div class="ct-card-actions" style="margin-top:12px;">
              <a class="ct-btn ct-btn-primary" id="ct-vis-open-html" target="_blank" rel="noopener">Abrir HTML</a>
              <button class="ct-btn" id="ct-vis-download-html" type="button">Descargar HTML</button>
              <button class="ct-btn" id="ct-vis-copy-html" type="button">Copiar HTML</button>
            </div>
          </div>
          <p class="ct-preview-status" id="ct-vis-status"></p>
        </aside>

        <div class="ct-preview-pane">
          <div class="ct-preview-frame-wrap">
            <iframe
              id="ct-vis-frame"
              class="ct-preview-frame"
              title="Previsualización del correo"
              sandbox="allow-same-origin"
              scrolling="no"
            ></iframe>
          </div>
        </div>
      </div>
    </main>

    <script src="../../config.js"></script>
    <script src="../../assets/js/shared.js"></script>
    <script>
      (function () {
        const BASE = '../../';
        CT.renderTopbar('visualizador', BASE);

        const examples = EXAMPLE_SCENARIOS;

        const platformSelect = document.getElementById('ct-vis-platform');
        const channelSelect = document.getElementById('ct-vis-channel');
        const storeSelect = document.getElementById('ct-vis-store');
        const logisticaSelect = document.getElementById('ct-vis-logistica');
        const templateSelect = document.getElementById('ct-vis-template');
        const exampleSelect = document.getElementById('ct-vis-example');
        const badgesEl = document.getElementById('ct-vis-badges');
        const nombreEl = document.getElementById('ct-vis-nombre');
        const descripcionEl = document.getElementById('ct-vis-descripcion');
        const archivoEl = document.getElementById('ct-vis-archivo');
        const ejemploEl = document.getElementById('ct-vis-ejemplo');
        const scenarioLabelEl = document.getElementById('ct-vis-scenario-label');
        const scenarioNoteEl = document.getElementById('ct-vis-scenario-note');
        const exampleHelpEl = document.getElementById('ct-vis-example-help');
        const statusEl = document.getElementById('ct-vis-status');
        const frame = document.getElementById('ct-vis-frame');
        const openHtmlBtn = document.getElementById('ct-vis-open-html');
        const downloadHtmlBtn = document.getElementById('ct-vis-download-html');
        const copyHtmlBtn = document.getElementById('ct-vis-copy-html');

        const renderable = TEMPLATES.filter((t) => t.archivoHtml);
        const urlParams = new URLSearchParams(window.location.search);
        const requestedPlatform = urlParams.get('platform');
        const requestedChannel = urlParams.get('channel');
        const requestedStore = urlParams.get('store');
        const requestedTemplateId = urlParams.get('template');
        const requestedExamplePath = urlParams.get('example');
        const requestedDevice = urlParams.get('device');
        let activeDevice = ['desktop', 'tablet', 'mobile'].includes(requestedDevice) ? requestedDevice : 'desktop';

        function addOptions(selectEl, options) {
          options.forEach((item) => {
            const option = document.createElement('option');
            option.value = item.id || item;
            option.textContent = item.label || item;
            selectEl.appendChild(option);
          });
        }

        function rebuildSelect(selectEl, allOptions, validSet) {
          const current = selectEl.value;
          while (selectEl.options.length > 1) selectEl.remove(1);
          allOptions.forEach((opt) => {
            if (validSet.has(opt.id)) {
              const option = document.createElement('option');
              option.value = opt.id;
              option.textContent = opt.label;
              selectEl.appendChild(option);
            }
          });
          selectEl.value = validSet.has(current) ? current : '';
        }

        function refreshChannelOptions() {
          const platform = platformSelect.value;
          const validChannels = new Set();
          renderable.forEach((t) => {
            if (!platform || t.plataforma === platform) CT.templateChannels(t).forEach((c) => validChannels.add(c));
          });
          rebuildSelect(channelSelect, CT.CHANNEL_OPTIONS, validChannels);
        }

        function refreshStoreOptions() {
          const platform = platformSelect.value;
          const channel = channelSelect.value;
          const validStores = new Set();
          if (channel && CT.CHANNEL_STORES[channel]) {
            CT.CHANNEL_STORES[channel].forEach((s) => validStores.add(s));
          } else {
            renderable.forEach((t) => {
              if ((!platform || t.plataforma === platform) && (!channel || CT.templateChannels(t).includes(channel))) {
                CT.templateStores(t).forEach((s) => { if (s !== 'shared') validStores.add(s); });
              }
            });
          }
          rebuildSelect(storeSelect, CT.STORE_OPTIONS, validStores);
        }

        function refreshLogisticaOptions() {
          const platform = platformSelect.value;
          const channel = channelSelect.value;
          const store = storeSelect.value;
          const validLogistica = new Set();
          if (channel && CT.CHANNEL_LOGISTICA[channel]) {
            CT.CHANNEL_LOGISTICA[channel].forEach((l) => validLogistica.add(l));
          } else {
            renderable.forEach((t) => {
              if ((!platform || t.plataforma === platform) &&
                  (!channel || CT.templateChannels(t).includes(channel)) &&
                  (!store || CT.templateStores(t).includes(store) || CT.templateStores(t).includes('shared'))) {
                CT.templateLogistics(t).forEach((l) => validLogistica.add(l));
              }
            });
          }
          rebuildSelect(logisticaSelect, CT.LOGISTICA_OPTIONS, validLogistica);
        }

        addOptions(platformSelect, Array.from(new Set(renderable.map((t) => t.plataforma).filter(Boolean))).sort().map((id) => ({ id, label: id })));
        refreshChannelOptions();
        refreshStoreOptions();
        refreshLogisticaOptions();

        const facetsContainer = document.getElementById('ct-vis-facets');
        const facetSelects = {};
        CT.FACET_GROUPS.forEach((group) => {
          const wrap = document.createElement('label');
          wrap.className = 'ct-vis-facet';
          wrap.innerHTML = `<span>${group.label}</span>`;
          const select = document.createElement('select');
          select.setAttribute('aria-label', `Filtrar por ${group.label}`);
          select.innerHTML = '<option value="">Todas</option>';
          group.options.forEach((opt) => {
            const option = document.createElement('option');
            option.value = opt.id;
            option.textContent = opt.label;
            select.appendChild(option);
          });
          wrap.appendChild(select);
          facetsContainer.appendChild(wrap);
          facetSelects[group.id] = select;
        });

        function facetFilters() {
          const out = {};
          Object.keys(facetSelects).forEach((groupId) => { out[groupId] = facetSelects[groupId].value; });
          return out;
        }

        function renderFacetOptions(template) {
          const channelFilter = channelSelect.value || CT.templateChannels(template)[0];
          const storeFilter = storeSelect.value || CT.templateStores(template)[0];
          const baseScenarios = examples.filter((s) => {
            if (!s.compatibleTemplates?.includes(template?.id)) return false;
            return CT.matchesChannelStore(s, { channel: channelFilter, store: storeFilter, logistica: logisticaSelect.value });
          });

          CT.FACET_GROUPS.forEach((group) => {
            const select = facetSelects[group.id];
            const wrap = select.closest('label');
            const available = new Set();
            baseScenarios.forEach((s) => {
              CT.scenarioFacets(s).forEach((f) => {
                if (group.options.some((o) => o.id === f)) available.add(f);
              });
            });
            select.innerHTML = '<option value="">Todas</option>';
            group.options.forEach((opt) => {
              if (available.has(opt.id)) {
                const option = document.createElement('option');
                option.value = opt.id;
                option.textContent = opt.label;
                select.appendChild(option);
              }
            });
            if (select.value && !available.has(select.value)) select.value = '';
            wrap.style.display = available.size > 0 ? '' : 'none';
          });
        }

        function filteredTemplates() {
          return renderable.filter((template) => {
            const matchesPlatform = !platformSelect.value || template.plataforma === platformSelect.value;
            return matchesPlatform && CT.matchesChannelStore(template, {
              channel: channelSelect.value,
              store: storeSelect.value,
              logistica: logisticaSelect.value,
            });
          });
        }

        function syncUrl() {
          const params = new URLSearchParams();
          if (platformSelect.value) params.set('platform', platformSelect.value);
          if (channelSelect.value) params.set('channel', channelSelect.value);
          if (storeSelect.value) params.set('store', storeSelect.value);
          if (templateSelect.value) params.set('template', templateSelect.value);
          if (exampleSelect.value) params.set('example', exampleSelect.value);
          const qs = params.toString();
          history.replaceState(null, '', qs ? `?${qs}` : window.location.pathname);
        }

        function renderTemplateOptions(preferredId) {
          const options = filteredTemplates();
          templateSelect.innerHTML = '';
          options.forEach((template) => {
            const count = examples.filter((s) => isCompatibleScenario(template, s)).length;
            const countTag = count === 0 ? '–' : String(count);
            const option = document.createElement('option');
            option.value = template.id;
            option.textContent = `${template.plataforma} · ${CT.labelsFor(CT.templateChannels(template), CT.channelLabel)} · ${CT.labelsFor(CT.templateStores(template), CT.storeLabel)} · ${template.nombre} (${countTag})`;
            templateSelect.appendChild(option);
          });
          const selected = options.find((template) => template.id === preferredId) || options[0];
          if (selected) templateSelect.value = selected.id;
          templateSelect.disabled = options.length === 0;
          return selected;
        }

        function currentTemplate() {
          return filteredTemplates().find((t) => t.id === templateSelect.value) || filteredTemplates()[0];
        }

        function scenarioByPath(path) {
          return examples.find((example) => example.path === path);
        }

        function htmlUrl(template) {
          return template?.archivoHtml ? BASE + template.archivoHtml : '';
        }

        function isCompatibleScenario(template, scenario) {
          if (!template || !scenario) return false;
          if (!Array.isArray(scenario.compatibleTemplates) || !scenario.compatibleTemplates.length) return true;
          const channelFilter = channelSelect.value || CT.templateChannels(template)[0];
          const storeFilter = storeSelect.value || CT.templateStores(template)[0];
          if (!CT.matchesChannelStore(scenario, { channel: channelFilter, store: storeFilter, logistica: logisticaSelect.value })) return false;
          if (!CT.matchesFacets(scenario, facetFilters())) return false;
          return scenario.compatibleTemplates.includes(template.id);
        }

        function compatibleScenarios(template) {
          return examples.filter((scenario) => isCompatibleScenario(template, scenario));
        }

        function groupScenariosByType(items) {
          return items.reduce((groups, scenario) => {
            const key = scenario.tipo || 'Escenario';
            if (!groups[key]) groups[key] = [];
            groups[key].push(scenario);
            return groups;
          }, {});
        }

        function renderScenarioOptions(template, preferredPath) {
          const compatible = compatibleScenarios(template);
          const groups = groupScenariosByType(compatible);
          exampleSelect.innerHTML = '';

          Object.keys(groups).forEach((type) => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = type;
            groups[type].forEach((scenario) => {
              const option = document.createElement('option');
              option.value = scenario.path;
              option.textContent = scenario.label;
              optgroup.appendChild(option);
            });
            exampleSelect.appendChild(optgroup);
          });

          const preferred = scenarioByPath(preferredPath);
          const templateDefault = scenarioByPath(template?.ejemplo);
          const fallback = templateDefault && isCompatibleScenario(template, templateDefault) ? templateDefault : compatible[0];
          const selected = preferred && isCompatibleScenario(template, preferred) ? preferred : fallback;
          if (selected) exampleSelect.value = selected.path;

          exampleSelect.disabled = compatible.length === 0;
          exampleHelpEl.className = `ct-vis-field-note ${
            compatible.length === 0 ? 'ct-coverage-empty' : compatible.length === 1 ? 'ct-coverage-low' : 'ct-coverage-ok'
          }`;
          exampleHelpEl.textContent = compatible.length
            ? `${compatible.length} escenario${compatible.length !== 1 ? 's' : ''} disponible${compatible.length !== 1 ? 's' : ''} para esta plantilla.`
            : 'Sin escenarios compatibles — esta plantilla no tiene datos de prueba.';
        }

        function currentScenario() {
          return scenarioByPath(exampleSelect.value);
        }

        function setStatus(message, isError) {
          statusEl.textContent = message || '';
          statusEl.classList.toggle('error', Boolean(isError));
        }

        async function readCurrentHtml() {
          const template = currentTemplate();
          if (!template?.archivoHtml) throw new Error('La plantilla seleccionada no tiene HTML asociado.');
          return {
            template,
            html: await CT.fetchText(BASE + template.archivoHtml),
          };
        }

        function copyTextFallback(text) {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          const copied = document.execCommand('copy');
          document.body.removeChild(textarea);
          if (!copied) throw new Error('El navegador no permitiÃ³ copiar al portapapeles.');
        }

        function applyDevice(device) {
          activeDevice = device;
          frame.dataset.device = device;
          document.querySelectorAll('#ct-vis-device-switch button').forEach((button) => {
            const isActive = button.dataset.device === device;
            button.classList.toggle('active', isActive);
            button.setAttribute('aria-pressed', String(isActive));
          });
          window.setTimeout(() => CT.resizeEmailFrame(frame), 0);
        }

        function updateInfo(template) {
          const scenario = currentScenario();
          badgesEl.innerHTML = `${CT.platformBadge(template.plataforma)}${CT.channelBadges(CT.templateChannels(template))}${CT.storeBadges(CT.templateStores(template))}${CT.logisticaBadges(CT.templateLogistics(template))}${CT.statusBadge(template.estado)}`;
          nombreEl.textContent = template.nombre;
          descripcionEl.textContent = template.descripcion;
          archivoEl.textContent = template.archivoHtml;
          openHtmlBtn.href = htmlUrl(template) || '#';
          openHtmlBtn.toggleAttribute('aria-disabled', !template.archivoHtml);
          downloadHtmlBtn.disabled = !template.archivoHtml;
          copyHtmlBtn.disabled = !template.archivoHtml;
          scenarioLabelEl.textContent = scenario ? `${scenario.tipo || 'Escenario'} · ${scenario.label}` : 'Sin escenario seleccionado';
          ejemploEl.textContent = scenario ? scenario.path : '';
          const facetMarkup = scenario ? CT.facetBadges(CT.scenarioFacets(scenario)) : '';
          scenarioNoteEl.innerHTML = `${scenario?.descripcion ? CT.escapeHtml(scenario.descripcion) : ''}${facetMarkup ? `<span class="ct-vis-scenario-facets">${facetMarkup}</span>` : ''}`;
        }

        async function downloadCurrentHtml() {
          const originalText = downloadHtmlBtn.textContent;
          downloadHtmlBtn.disabled = true;
          downloadHtmlBtn.textContent = 'Descargando...';
          try {
            const { template, html } = await readCurrentHtml();
            const filename = template.archivoHtml.split('/').pop() || `${template.id || 'plantilla'}.html`;
            CT.downloadFile(filename, html, 'text/html');
            setStatus(`Descarga iniciada: ${filename}`);
          } catch (error) {
            setStatus('No se pudo descargar el HTML: ' + error.message, true);
          } finally {
            downloadHtmlBtn.disabled = false;
            downloadHtmlBtn.textContent = originalText;
          }
        }

        async function copyCurrentHtml() {
          const originalText = copyHtmlBtn.textContent;
          copyHtmlBtn.disabled = true;
          copyHtmlBtn.textContent = 'Copiando...';
          try {
            const { html } = await readCurrentHtml();
            try {
              window.focus();
              await navigator.clipboard.writeText(html);
            } catch (clipboardError) {
              copyTextFallback(html);
            }
            setStatus('HTML copiado al portapapeles.');
          } catch (error) {
            setStatus('No se pudo copiar el HTML: ' + error.message, true);
          } finally {
            copyHtmlBtn.disabled = false;
            copyHtmlBtn.textContent = originalText;
          }
        }

        let renderGeneration = 0;

        async function renderPreview() {
          const gen = ++renderGeneration;
          const template = currentTemplate();
          const scenario = currentScenario();
          if (!template) return;

          updateInfo(template);
          if (!scenario) {
            frame.srcdoc = '';
            setStatus('No hay un escenario compatible para esta plantilla.', true);
            return;
          }

          setStatus('Renderizando…');
          frame.srcdoc = '';

          try {
            const [html, jsonText] = await Promise.all([
              CT.fetchText(BASE + template.archivoHtml),
              CT.fetchText(BASE + scenario.path),
            ]);
            if (gen !== renderGeneration) return;
            let data;
            try {
              data = JSON.parse(jsonText);
            } catch (e) {
              throw new Error(`JSON inválido en ${scenario.path}: ${e.message}`);
            }
            if (CT.slugify(template.plataforma) === 'pim') {
              CT.renderPimEmailToFrame(frame, html, data);
            } else {
              CT.renderEmailToFrame(frame, html, data);
            }
            setStatus(`Renderizado con escenario compatible: ${scenario.label}`);
          } catch (error) {
            if (gen !== renderGeneration) return;
            setStatus('No se pudo renderizar la previsualización: ' + error.message, true);
          }
        }

        function doFilterChange() {
          const preferred = templateSelect.value;
          const template = renderTemplateOptions(preferred);
          if (template) {
            Object.values(facetSelects).forEach((s) => { s.value = ''; });
            renderFacetOptions(template);
            renderScenarioOptions(template, template.ejemplo);
            syncUrl();
            renderPreview();
          } else {
            exampleSelect.innerHTML = '';
            frame.srcdoc = '';
            syncUrl();
            setStatus('No hay plantillas para los filtros seleccionados.', true);
          }
        }

        platformSelect.addEventListener('change', () => {
          refreshChannelOptions();
          refreshStoreOptions();
          refreshLogisticaOptions();
          doFilterChange();
        });
        channelSelect.addEventListener('change', () => {
          refreshStoreOptions();
          refreshLogisticaOptions();
          doFilterChange();
        });
        storeSelect.addEventListener('change', () => {
          refreshLogisticaOptions();
          doFilterChange();
        });
        logisticaSelect.addEventListener('change', doFilterChange);

        // Las facetas solo acotan los escenarios compatibles del template actual.
        Object.values(facetSelects).forEach((select) => {
          select.addEventListener('change', () => {
            const template = currentTemplate();
            if (template) {
              renderScenarioOptions(template, template.ejemplo);
              renderPreview();
            }
          });
        });

        templateSelect.addEventListener('change', () => {
          const template = currentTemplate();
          if (template) renderFacetOptions(template);
          Object.values(facetSelects).forEach((s) => { s.value = ''; });
          renderScenarioOptions(template, template?.ejemplo);
          syncUrl();
          renderPreview();
        });

        exampleSelect.addEventListener('change', () => { syncUrl(); renderPreview(); });
        downloadHtmlBtn.addEventListener('click', downloadCurrentHtml);
        copyHtmlBtn.addEventListener('click', copyCurrentHtml);

        document.getElementById('ct-vis-device-switch').addEventListener('click', (event) => {
          const button = event.target.closest('button[data-device]');
          if (!button) return;
          applyDevice(button.dataset.device);
        });

        applyDevice(activeDevice);

        if (renderable.length) {
          const requestedTemplate = renderable.find((t) => t.id === requestedTemplateId);
          platformSelect.value = requestedPlatform || (requestedTemplate ? requestedTemplate.plataforma : '');
          channelSelect.value = requestedChannel || (requestedTemplate ? CT.templateChannels(requestedTemplate)[0] : '');
          storeSelect.value = requestedStore || (requestedTemplate ? CT.templateStores(requestedTemplate)[0] : '');
          if (storeSelect.value && !filteredTemplates().length) storeSelect.value = '';
          if (channelSelect.value && !filteredTemplates().length) channelSelect.value = '';
          if (platformSelect.value && !filteredTemplates().length) platformSelect.value = '';
          const initial = renderTemplateOptions(requestedTemplate?.id);
          if (initial) {
            renderFacetOptions(initial);
            renderScenarioOptions(initial, requestedExamplePath || initial.ejemplo);
            syncUrl();
            renderPreview();
          } else {
            setStatus('No hay plantillas para los filtros seleccionados.', true);
          }
        } else {
          setStatus('Todavía no hay plantillas con HTML asociado en el catálogo.', true);
        }
      })();
    </script>
  </body>
</html>
